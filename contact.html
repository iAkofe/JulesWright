    window.dataLayer = window.dataLayer || [];

<body class="contact-page">
  <header class="site-header">
    <div class="container header-row">
      <a class="brand" href="index.html" aria-label="Jules Wright home">
        <img class="brand-image" src="jim-logo black 1.png" alt="Jules Wright">
      </a>

      <nav class="site-nav" id="primary-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="about.html">About Author</a>
        <a href="books.html">My Books</a>
        <a href="contact.html">Contact Us</a>
        <a class="button button-dark nav-cta" href="index.html#platforms">Buy On Amazon</a>
      </nav>

      <a class="button button-dark" href="index.html#platforms">Buy On Amazon</a>
      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="primary-nav">☰</button>
    </div>
  </header>

  <main class="contact-page-main">
    <section class="contact-page-title">
      <div class="container">
        <h1>Contact Us</h1>
      </div>
    </section>

    <section class="contact-page-section">
      <div class="container contact-card contact-card-compact contact-page-card">
        <div class="contact-copy">
          <h2>Get in touch</h2>
          <p>Don’t Hesitate to contact with us for any inquiries.</p>

          <div class="book-stack" aria-hidden="true">
            <img src="images/Book_Mockup_3 copy 1.png" alt="Yul the Younger books" />
          </div>
        </div>

        <form class="contact-form">
          <label>
            <span>First Name</span>
            <input type="text" name="first_name">
          </label>
          <label>
            <span>Last Name</span>
            <input type="text" name="last_name">
          </label>
          <label>
            <span>Email Address</span>
            <input type="email" name="email">
          </label>
          <label>
            <span>Message</span>
            <textarea name="message" rows="4"></textarea>
          </label>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div class="footer-brand">
        <a class="brand footer-logo" href="index.html" aria-label="Jules Wright home">
          <img class="brand-image" src="footerLogo.png" alt="Jules Wright">
        </a>
        <p>©2024 Jules Wright. All rights reserved.</p>
      </div>

        <a href="index.html#platforms">Harper Collins Publishers</a>
        <a href="index.html#platforms">Barnes &amp; Noble</a>
      </div>
    </div>
  </footer>
  <script src="script.js"></script>
